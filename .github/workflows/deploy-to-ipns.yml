name: Deploy to IPNS

# 当有代码推送到 main 分支时触发
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出你的代码
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. 设置 pnpm 环境
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8 # pnpm 版本

      # 3. 设置 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'

      # 4. 安装依赖并构建项目
      - name: Install and Build
        run: |
          pnpm install
          pnpm build

      # 5. 安装 IPFS (Kubo)
      - name: Install IPFS
        run: |
          wget https://dist.ipfs.tech/kubo/v0.20.0/kubo_v0.20.0_linux-amd64.tar.gz
          tar -xvzf kubo_v0.20.0_linux-amd64.tar.gz
          sudo bash kubo/install.sh
          ipfs init

      # 6. 导入 IPNS 私钥
      - name: Import IPNS Key
        run: |
          echo "${{ secrets.IPNS_KEY }}" | ipfs key import my-tts-liuli-key -
          
      # 7. 启动 IPFS 守护进程并在后台运行
      - name: Start IPFS Daemon
        run: ipfs daemon &
        
      # 8. 等待守护进程启动，确保网络连接稳定
      - name: Wait for Daemon
        run: sleep 15

      # 9. 将构建好的网站文件夹 (dist) 上传到 IPFS
      - name: Add to IPFS
        id: ipfs_add
        run: |
          CID=$(ipfs add -r ./dist -Q)
          echo "CID=$CID" >> $GITHUB_OUTPUT

      # 10. 将新的 CID 发布到 IPNS
      - name: Publish to IPNS
        run: |
          KEY_ID=$(ipfs key list -l | grep my-tts-liuli-key | awk '{print $1}')
          echo "Publishing CID ${{ steps.ipfs_add.outputs.CID }} to IPNS..."
          echo "Your IPNS Key ID is: $KEY_ID"
          ipfs name publish --key=my-tts-liuli-key /ipfs/${{ steps.ipfs_add.outputs.CID }}
          echo "Deployment successful!"
